<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Latidos Niños — Aprende las tablas de multiplicar del 1 al 10 con juegos." />
  <title>Tablas — Latidos Niños</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* Table selector pills */
    .table-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .table-pill  {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid transparent; background: #fff;
      font-family: var(--font); font-size: 1rem; font-weight: 900;
      cursor: pointer; transition: all var(--transition); box-shadow: var(--shadow-sm);
    }
    .table-pill:hover  { transform: scale(1.15); box-shadow: var(--shadow-md); background: var(--coral-light); border-color: var(--coral); }
    .table-pill.active { background: var(--coral); color: #fff; border-color: var(--coral-dark); transform: scale(1.1); }

    /* Flashcard */
    .flashcard-wrap {
      perspective: 800px; cursor: pointer; max-width: 300px; margin: 0 auto;
    }
    .flashcard {
      width: 100%; height: 180px; position: relative;
      transform-style: preserve-3d; transition: transform 0.5s ease;
      border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; border-radius: var(--radius-xl);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .card-front { background: linear-gradient(135deg, var(--coral), var(--orange)); color: #fff; }
    .card-back  { background: linear-gradient(135deg, var(--green), var(--blue)); color: #fff; transform: rotateY(180deg); }
    .card-eq    { font-size: 2.2rem; font-weight: 900; }
    .card-ans   { font-size: 3rem; font-weight: 900; }
    .card-hint  { font-size: 0.82rem; font-weight: 700; opacity: 0.85; margin-top: 4px; }

    /* Full multiplication table */
    .full-table-container { overflow-x: auto; }

    /* Bingo call display */
    .bingo-call {
      background: linear-gradient(135deg, var(--coral), var(--purple));
      color: #fff; border-radius: var(--radius-xl); padding: 20px 28px;
      text-align: center; margin-bottom: 20px; box-shadow: var(--shadow-md);
    }
    .bingo-call-label { font-size: 0.78rem; font-weight: 700; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.08em; }
    .bingo-call-num   { font-size: 3rem; font-weight: 900; }

    .bingo-status { text-align: center; font-weight: 800; color: var(--text-mid); font-size: 0.85rem; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="main-content">
    <div class="container">

      <div class="page-header">
        <span class="page-emoji">✖️</span>
        <h1>Tablas de <span style="color:var(--coral);">Multiplicar</span></h1>
        <p>Aprende, practica y juega al Bingo</p>
      </div>

      <!-- Table selector -->
      <div class="table-pills" id="table-pills" role="group" aria-label="Selecciona la tabla">
        <!-- Generated by JS -->
      </div>

      <!-- Tabs -->
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="tlearn"  role="tab">📖 Aprender</button>
        <button class="tab-btn"        data-tab="tquiz"   role="tab">⚡ Quiz</button>
        <button class="tab-btn"        data-tab="tbingo"  role="tab">🎯 Bingo</button>
        <button class="tab-btn"        data-tab="tgrid"   role="tab">📊 Tabla completa</button>
      </div>

      <!-- ── TAB: LEARN (flashcards) ────────────────────── -->
      <div id="ttab-tlearn" class="tab-content">
        <div class="flashcard-wrap" id="flashcard-wrap" title="Haz clic para revelar la respuesta">
          <div class="flashcard" id="flashcard">
            <div class="card-face card-front">
              <div class="card-eq" id="fc-eq">3 × 4</div>
              <div class="card-hint">Toca para ver la respuesta</div>
            </div>
            <div class="card-face card-back">
              <div class="card-ans" id="fc-ans">12</div>
              <div class="card-hint" id="fc-back-eq"></div>
            </div>
          </div>
        </div>

        <div class="flex justify-center gap-12 mt-24">
          <button class="btn btn-ghost" id="fc-prev">⬅️ Anterior</button>
          <span style="font-weight:700; color:var(--text-mid); align-self:center;" id="fc-counter">1/9</span>
          <button class="btn btn-primary" id="fc-next">Siguiente ➡️</button>
        </div>

        <div class="card mt-24" id="full-table-card">
          <h3 style="margin-bottom:14px; color:var(--coral);" id="full-table-title">Tabla del 3</h3>
          <div id="full-table-list"></div>
        </div>
      </div>

      <!-- ── TAB: QUIZ ──────────────────────────────────── -->
      <div id="ttab-tquiz" class="tab-content" style="display:none;">
        <div class="game-stats">
          <div class="stat-item"><span class="stat-icon">⭐</span><span id="tq-score">0</span> pts</div>
          <div class="stat-item">
            <!-- Timer ring -->
            <div class="timer-ring" id="timer-ring">
              <svg viewBox="0 0 60 60" width="60" height="60">
                <circle class="track"    cx="30" cy="30" r="26"/>
                <circle class="progress" cx="30" cy="30" r="26" id="timer-arc"/>
              </svg>
              <div class="timer-text" id="timer-txt">10</div>
            </div>
          </div>
          <div class="stat-item"><span class="stat-icon">💖</span><span id="tq-lives">3</span></div>
        </div>

        <div class="question-card">
          <div class="equation-display" style="font-size:3rem;">
            <span class="eq-num" id="tq-a">?</span>
            <span class="eq-op">×</span>
            <span class="eq-num" id="tq-b">?</span>
            <span class="eq-op">=</span>
            <span class="eq-ans">?</span>
          </div>
        </div>

        <div id="tq-answer-grid" class="answer-grid"></div>

        <div class="progress-wrap mt-16">
          <div class="progress-bar" id="tq-progress" style="width:0%"></div>
        </div>
      </div>

      <!-- ── TAB: BINGO ─────────────────────────────────── -->
      <div id="ttab-tbingo" class="tab-content" style="display:none;">
        <div class="bingo-call" id="bingo-call-box">
          <div class="bingo-call-label">Marca el resultado de...</div>
          <div class="bingo-call-num" id="bingo-call-txt">3 × 4 = ?</div>
        </div>

        <div class="bingo-grid" id="bingo-grid"></div>
        <div class="bingo-status" id="bingo-status">Marca los números correctos en tu tarjeta</div>

        <div class="flex justify-center gap-12 mt-24">
          <button class="btn btn-ghost btn-sm" id="bingo-reset-btn">🔄 Nueva tarjeta</button>
          <button class="btn btn-green" id="bingo-next-btn">Siguiente número ➡️</button>
        </div>
      </div>

      <!-- ── TAB: FULL GRID ─────────────────────────────── -->
      <div id="ttab-tgrid" class="tab-content" style="display:none;">
        <div class="full-table-container">
          <div class="mult-table" id="mult-table-grid"></div>
        </div>
        <p style="text-align:center; color:var(--text-mid); font-size:0.82rem; font-weight:600; margin-top:12px;">
          Toca cualquier celda para escuchar la multiplicación
        </p>
      </div>

    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/sounds.js"></script>
  <script src="../js/tables.js"></script>
</body>
</html>
